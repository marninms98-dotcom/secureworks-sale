  <style>
    /* ══════════════════════════════════════════════════
       CSS VARIABLES
       ══════════════════════════════════════════════════ */
    :root {
      --sw-orange: #F15A29;
      --sw-dark: #293C46;
      --sw-mid: #4C6A7C;
      --sw-light: #F0F4F7;
      --sw-bg: #F7F8FA;
      --sw-border: #EAEDF0;
      --sw-text: #1A2332;
      --sw-text-sec: #7C8898;
      --sw-green: #27AE60;
      --sw-red: #E74C3C;
      --sw-yellow: #E67E22;
      --sw-blue: #3498DB;
      --sw-card: #FFFFFF;
      --sw-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --sw-shadow-hover: 0 10px 40px rgba(0,0,0,0.08);
      --sw-radius: 12px;
      --sw-font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --sw-font-num: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    /* ══════════════════════════════════════════════════
       RESET + BASE
       ══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sw-font);
      background: var(--sw-bg);
      color: var(--sw-text);
      line-height: 1.5;
      padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════════════════
       HEADER
       ══════════════════════════════════════════════════ */
    .header {
      background: var(--sw-dark);
      color: #fff;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-brand span { font-weight: 400; opacity: 0.7; }
    .header-nav { display: none; gap: 4px; }
    .header-nav button {
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
    }
    .header-nav button.active { background: var(--sw-orange); color: #fff; }
    .header-nav button:hover:not(.active) { background: rgba(255,255,255,0.15); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-user { font-size: 13px; opacity: 0.8; cursor: pointer; }
    .btn-header {
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-header:hover { background: rgba(255,255,255,0.2); }

    @media (min-width: 769px) {
      .header { padding: 12px 24px; }
      .header-nav { display: flex; }
    }

    /* ══════════════════════════════════════════════════
       BOTTOM NAV (mobile only)
       ══════════════════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--sw-dark);
      display: none;
      z-index: 100;
      padding: 6px 4px;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      gap: 4px;
    }
    .bottom-nav.show { display: flex; }
    .bottom-nav button {
      flex: 1;
      padding: 8px 4px;
      min-height: 48px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.15s;
    }
    .bottom-nav button.active { background: var(--sw-orange); color: #fff; }
    .bottom-nav button svg { width: 20px; height: 20px; fill: currentColor; }

    @media (min-width: 769px) {
      .bottom-nav { display: none !important; }
      body { padding-bottom: 0; }
    }

    /* ══════════════════════════════════════════════════
       VIEWS
       ══════════════════════════════════════════════════ */
    .view { display: none; }
    .view.active { display: block; }

    .container { padding: 16px; max-width: 800px; margin: 0 auto; }
    .container-wide { padding: 16px; max-width: 1200px; margin: 0 auto; }

    @media (min-width: 769px) {
      .container { padding: 24px; }
      .container-wide { padding: 24px; }
    }

    /* ══════════════════════════════════════════════════
       LOGIN
       ══════════════════════════════════════════════════ */
    .login-box {
      max-width: 360px;
      margin: 60px auto;
      padding: 32px 24px;
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      box-shadow: var(--sw-shadow);
      text-align: center;
    }
    .login-box h2 { font-size: 20px; color: var(--sw-dark); margin-bottom: 4px; }
    .login-box p { font-size: 13px; color: var(--sw-text-sec); margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      font-family: var(--sw-font);
    }
    .login-box input:focus { border-color: var(--sw-orange); }

    /* ══════════════════════════════════════════════════
       BUTTONS
       ══════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      font-family: var(--sw-font);
    }
    .btn-primary { background: var(--sw-orange); color: #fff; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: var(--sw-border); color: var(--sw-text-sec); cursor: default; }
    .btn-secondary { background: var(--sw-light); color: var(--sw-dark); }
    .btn-small { padding: 8px 14px; font-size: 13px; width: auto; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--sw-border);
      color: var(--sw-text);
      padding: 8px 14px;
      font-size: 13px;
      width: auto;
    }
    .btn-ghost:hover { background: var(--sw-light); }
    .btn-ghost.active { background: var(--sw-orange); color: #fff; border-color: var(--sw-orange); }

    /* ══════════════════════════════════════════════════
       STAT CARDS
       ══════════════════════════════════════════════════ */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    @media (min-width: 769px) {
      .stat-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .stat-card {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      padding: 14px;
      box-shadow: var(--sw-shadow);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-left: 4px solid var(--sw-border);
      transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: var(--sw-shadow-hover); }
    .stat-card.border-orange { border-left-color: var(--sw-orange); }
    .stat-card.border-green { border-left-color: var(--sw-green); }
    .stat-card.border-blue { border-left-color: var(--sw-blue); }
    .stat-card.border-amber { border-left-color: var(--sw-yellow); }
    .stat-card.border-red { border-left-color: var(--sw-red); }
    .stat-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon svg { width: 16px; height: 16px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .stat-icon.orange { background: rgba(241,90,41,0.1); }
    .stat-icon.orange svg { stroke: var(--sw-orange); }
    .stat-icon.green { background: rgba(39,174,96,0.1); }
    .stat-icon.green svg { stroke: var(--sw-green); }
    .stat-icon.blue { background: rgba(52,152,219,0.1); }
    .stat-icon.blue svg { stroke: var(--sw-blue); }
    .stat-icon.amber { background: rgba(230,126,34,0.1); }
    .stat-icon.amber svg { stroke: var(--sw-yellow); }
    .stat-body { flex: 1; min-width: 0; }
    .stat-label {
      font-size: 11px;
      color: var(--sw-text-sec);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--sw-text);
      font-family: var(--sw-font-num);
      line-height: 1.2;
      margin-top: 2px;
    }
    .stat-sub { font-size: 11px; color: var(--sw-text-sec); margin-top: 2px; }

    /* ══════════════════════════════════════════════════
       SECTION HEADINGS
       ══════════════════════════════════════════════════ */
    .section-heading {
      font-size: 15px;
      font-weight: 700;
      color: var(--sw-text);
      margin-bottom: 12px;
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-heading .badge {
      font-size: 11px;
      background: var(--sw-light);
      color: var(--sw-text-sec);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* ══════════════════════════════════════════════════
       ACTION SECTIONS (collapsible)
       ══════════════════════════════════════════════════ */
    .action-section {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      box-shadow: var(--sw-shadow);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .action-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--sw-text);
      user-select: none;
    }
    .action-header:hover { background: var(--sw-light); }
    .action-header .count-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      color: #fff;
      min-width: 22px;
      text-align: center;
    }
    .count-badge.red { background: var(--sw-red); }
    .count-badge.amber { background: var(--sw-yellow); }
    .count-badge.blue { background: var(--sw-blue); }
    .count-badge.green { background: var(--sw-green); }
    .count-badge.grey { background: var(--sw-text-sec); }
    .action-header .chevron {
      transition: transform 0.2s;
      color: var(--sw-text-sec);
      font-size: 12px;
    }
    .action-section.open .action-header .chevron { transform: rotate(180deg); }
    .action-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .action-section.open .action-body { max-height: 2000px; }
    .action-body-inner { padding: 0 16px 14px; }

    .action-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--sw-border);
    }
    .action-item:last-child { border-bottom: none; }
    .action-item-info { flex: 1; min-width: 0; }
    .action-item-name { font-size: 14px; font-weight: 600; color: var(--sw-text); }
    .action-item-detail { font-size: 12px; color: var(--sw-text-sec); margin-top: 1px; }
    .action-item-value { font-size: 13px; font-weight: 600; color: var(--sw-text); font-family: var(--sw-font-num); }
    .action-item-days {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .days-green { background: rgba(39,174,96,0.1); color: var(--sw-green); }
    .days-amber { background: rgba(230,126,34,0.1); color: var(--sw-yellow); }
    .days-red { background: rgba(231,76,60,0.1); color: var(--sw-red); }
    .action-item-phone {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(39,174,96,0.1);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .action-item-phone svg { width: 16px; height: 16px; stroke: var(--sw-green); fill: none; stroke-width: 2; }

    /* ══════════════════════════════════════════════════
       ACTIVITY FEED
       ══════════════════════════════════════════════════ */
    .feed-list { list-style: none; }
    .feed-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--sw-border);
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--sw-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    .feed-body { flex: 1; min-width: 0; }
    .feed-text { font-size: 13px; color: var(--sw-text); }
    .feed-text strong { font-weight: 600; }
    .feed-time { font-size: 11px; color: var(--sw-text-sec); margin-top: 2px; }

    /* ══════════════════════════════════════════════════
       LOADING + EMPTY + ERROR
       ══════════════════════════════════════════════════ */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--sw-text-sec);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--sw-border);
      border-top-color: var(--sw-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--sw-text-sec);
      font-size: 14px;
    }
    .empty-state svg { width: 48px; height: 48px; fill: var(--sw-border); margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
    .error-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--sw-red);
      font-size: 14px;
    }
    .error-state button { margin-top: 12px; }

    /* ══════════════════════════════════════════════════
       ADMIN SALESPERSON DROPDOWN
       ══════════════════════════════════════════════════ */
    .admin-filter {
      margin-bottom: 16px;
      display: none;
    }
    .admin-filter.show { display: block; }
    .admin-filter select {
      padding: 8px 12px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--sw-font);
      background: var(--sw-card);
      color: var(--sw-text);
      min-width: 200px;
    }

    /* ══════════════════════════════════════════════════
       PIPELINE — KANBAN
       ══════════════════════════════════════════════════ */
    .pipeline-total {
      font-size: 14px;
      color: var(--sw-text-sec);
      margin-bottom: 16px;
    }
    .pipeline-total strong {
      font-size: 22px;
      font-weight: 700;
      color: var(--sw-text);
      font-family: var(--sw-font-num);
    }
    .filter-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 6px 14px;
      border: 1px solid var(--sw-border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--sw-card);
      color: var(--sw-text);
      font-family: var(--sw-font);
      transition: all 0.15s;
    }
    .filter-chip.active { background: var(--sw-orange); color: #fff; border-color: var(--sw-orange); }
    .filter-chip:hover:not(.active) { background: var(--sw-light); }

    .kanban {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      min-height: 400px;
    }
    @media (max-width: 768px) {
      .kanban {
        grid-template-columns: repeat(4, 280px);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x mandatory;
        padding-bottom: 8px;
      }
      .kanban-col { scroll-snap-align: start; }
    }
    .kanban-col {
      background: var(--sw-light);
      border-radius: var(--sw-radius);
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    .kanban-header {
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fff;
      border-radius: var(--sw-radius) var(--sw-radius) 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kanban-header .col-count {
      font-size: 11px;
      background: rgba(255,255,255,0.25);
      padding: 1px 7px;
      border-radius: 8px;
    }
    .kanban-header.blue { background: var(--sw-blue); }
    .kanban-header.orange { background: var(--sw-orange); }
    .kanban-header.green { background: var(--sw-green); }
    .kanban-header.red { background: var(--sw-red); }
    .kanban-body {
      flex: 1;
      padding: 8px;
      overflow-y: auto;
      max-height: 600px;
    }
    .kanban-card {
      background: var(--sw-card);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: var(--sw-shadow);
      cursor: pointer;
      border-left: 3px solid var(--sw-green);
      transition: box-shadow 0.15s;
    }
    .kanban-card:hover { box-shadow: var(--sw-shadow-hover); }
    .kanban-card.age-green { border-left-color: var(--sw-green); }
    .kanban-card.age-amber { border-left-color: var(--sw-yellow); }
    .kanban-card.age-red { border-left-color: var(--sw-red); }
    .kanban-card-name { font-size: 14px; font-weight: 600; color: var(--sw-text); }
    .kanban-card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--sw-text-sec);
    }
    .type-pill {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 2px 7px;
      border-radius: 8px;
    }
    .type-pill.patio { background: rgba(52,152,219,0.1); color: var(--sw-blue); }
    .type-pill.fencing { background: rgba(241,90,41,0.1); color: var(--sw-orange); }
    .type-pill.decking { background: rgba(230,126,34,0.1); color: var(--sw-yellow); }
    .type-pill.combo { background: rgba(142,68,173,0.1); color: #8E44AD; }
    .kanban-card-value {
      font-size: 14px;
      font-weight: 700;
      font-family: var(--sw-font-num);
      color: var(--sw-text);
      margin-top: 6px;
    }
    .kanban-card-days { font-size: 11px; color: var(--sw-text-sec); margin-top: 4px; }
    .kanban-collapsed {
      padding: 12px 14px;
      text-align: center;
      font-size: 13px;
      color: var(--sw-text-sec);
      cursor: pointer;
    }
    .kanban-collapsed:hover { background: rgba(0,0,0,0.02); }

    /* ══════════════════════════════════════════════════
       DETAIL SLIDE PANEL
       ══════════════════════════════════════════════════ */
    .slide-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }
    .slide-overlay.show { display: block; }
    .slide-panel {
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 400px;
      max-width: 100vw;
      background: var(--sw-card);
      z-index: 200;
      box-shadow: -10px 0 40px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .slide-panel.show { transform: translateX(0); }
    @media (max-width: 768px) {
      .slide-panel { width: 100vw; }
    }
    .slide-header {
      padding: 16px;
      border-bottom: 1px solid var(--sw-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .slide-header h3 { font-size: 16px; font-weight: 700; }
    .slide-close {
      width: 32px; height: 32px;
      border: none;
      background: var(--sw-light);
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sw-text-sec);
    }
    .slide-body { padding: 16px; flex: 1; }
    .slide-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--sw-border);
      font-size: 13px;
    }
    .slide-row:last-child { border-bottom: none; }
    .slide-label { color: var(--sw-text-sec); }
    .slide-val { font-weight: 600; color: var(--sw-text); text-align: right; }
    .slide-val a { color: var(--sw-blue); text-decoration: none; }
    .slide-notes {
      margin-top: 16px;
      padding: 12px;
      background: var(--sw-light);
      border-radius: 8px;
      font-size: 13px;
      color: var(--sw-text-sec);
      white-space: pre-wrap;
    }
    .slide-actions { padding: 16px; border-top: 1px solid var(--sw-border); }
    .slide-actions textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--sw-font);
      resize: vertical;
      min-height: 60px;
      margin-bottom: 8px;
    }

    /* ── Client Chat ── */
    .chat-section { border-top: 1px solid var(--sw-border); margin-top: 16px; padding-top: 12px; }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .chat-header h4 { font-size: 14px; font-weight: 700; color: var(--sw-text); margin: 0; }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-header-actions button, .chat-header-actions a {
      font-size: 12px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--sw-border); background: var(--sw-light);
      color: var(--sw-text); cursor: pointer; text-decoration: none;
      font-weight: 600; display: inline-flex; align-items: center; gap: 4px;
    }
    .chat-header-actions .call-btn { background: var(--sw-green); color: #fff; border-color: var(--sw-green); }
    .chat-related { font-size: 11px; color: var(--sw-text-sec); margin-bottom: 8px; }
    .chat-thread {
      max-height: 400px; overflow-y: auto; padding: 8px 4px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--sw-bg); border-radius: 8px;
    }
    .chat-load-more {
      text-align: center; padding: 6px;
    }
    .chat-load-more button {
      font-size: 11px; padding: 4px 12px; border-radius: 6px;
      border: 1px solid var(--sw-border); background: var(--sw-card);
      color: var(--sw-text-sec); cursor: pointer;
    }
    .chat-msg {
      max-width: 80%; padding: 8px 12px; border-radius: 12px;
      font-size: 13px; line-height: 1.4; word-break: break-word;
    }
    .chat-msg.inbound {
      align-self: flex-start; background: var(--sw-light); color: var(--sw-text);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.outbound {
      align-self: flex-end; background: var(--sw-orange); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg .msg-body { margin-bottom: 2px; }
    .chat-msg .msg-meta {
      font-size: 10px; opacity: 0.7;
    }
    .chat-msg.outbound .msg-meta { text-align: right; }
    .chat-msg.call-log {
      align-self: center; background: transparent; color: var(--sw-text-sec);
      font-style: italic; font-size: 12px; text-align: center; max-width: 90%;
    }
    .chat-compose { margin-top: 8px; }
    .chat-template-row { margin-bottom: 6px; }
    .chat-template-row select {
      width: 100%; padding: 6px 10px; border: 1px solid var(--sw-border);
      border-radius: 6px; font-size: 12px; background: var(--sw-card);
      font-family: var(--sw-font);
    }
    .chat-input-row { display: flex; gap: 6px; align-items: flex-end; }
    .chat-input-row textarea {
      flex: 1; padding: 8px 10px; border: 1px solid var(--sw-border);
      border-radius: 8px; font-size: 14px; font-family: var(--sw-font);
      resize: none; min-height: 40px; max-height: 80px;
    }
    .chat-input-row textarea:focus { border-color: var(--sw-orange); outline: none; }
    .chat-send-btn {
      padding: 8px 14px; background: var(--sw-orange); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; min-height: 40px;
    }
    .chat-send-btn:disabled { opacity: 0.5; cursor: default; }
    .chat-char-count { font-size: 10px; color: var(--sw-text-sec); text-align: right; margin-top: 2px; }
    .chat-email-link {
      display: inline-block; font-size: 12px; color: var(--sw-blue);
      cursor: pointer; margin-top: 6px; text-decoration: underline;
    }
    .chat-fallback {
      padding: 16px; text-align: center; color: var(--sw-text-sec);
      font-size: 13px;
    }
    .chat-fallback a { color: var(--sw-blue); text-decoration: none; }

    /* ── Call Log Prompt ── */
    .call-log-prompt {
      padding: 12px; background: var(--sw-light); border-radius: 8px;
      margin-top: 8px;
    }
    .call-log-prompt p { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .call-log-prompt textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--sw-border);
      border-radius: 6px; font-size: 13px; font-family: var(--sw-font);
      resize: vertical; min-height: 50px; margin-bottom: 6px;
    }
    .call-log-prompt .btn-row { display: flex; gap: 6px; }

    /* ── Email Modal ── */
    .email-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 300;
      justify-content: center; align-items: center;
    }
    .email-modal-overlay.show { display: flex; }
    .email-modal {
      background: var(--sw-card); border-radius: var(--sw-radius);
      width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .email-modal-header {
      padding: 16px; border-bottom: 1px solid var(--sw-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .email-modal-header h4 { font-size: 15px; font-weight: 700; margin: 0; }
    .email-modal-body { padding: 16px; }
    .email-modal-body label { font-size: 12px; font-weight: 600; color: var(--sw-text-sec); display: block; margin-bottom: 4px; }
    .email-modal-body input, .email-modal-body textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--sw-border);
      border-radius: 8px; font-size: 14px; font-family: var(--sw-font);
      margin-bottom: 12px;
    }
    .email-modal-body textarea { min-height: 120px; resize: vertical; }
    .email-modal-footer {
      padding: 12px 16px; border-top: 1px solid var(--sw-border);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ══════════════════════════════════════════════════
       PERFORMANCE — KPI + CHARTS
       ══════════════════════════════════════════════════ */
    .period-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .period-btn {
      padding: 6px 14px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--sw-card);
      color: var(--sw-text);
      font-family: var(--sw-font);
      transition: all 0.15s;
    }
    .period-btn.active { background: var(--sw-orange); color: #fff; border-color: var(--sw-orange); }
    .period-btn:hover:not(.active) { background: var(--sw-light); }
    .custom-dates {
      display: none;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }
    .custom-dates.show { display: flex; }
    .custom-dates input[type="date"] {
      padding: 6px 10px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--sw-font);
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (min-width: 769px) {
      .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .kpi-card {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      padding: 14px;
      box-shadow: var(--sw-shadow);
      text-align: center;
    }
    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sw-text-sec);
      font-weight: 600;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      font-family: var(--sw-font-num);
      color: var(--sw-text);
      margin-top: 4px;
    }
    .kpi-sub { font-size: 11px; color: var(--sw-text-sec); margin-top: 2px; }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (min-width: 769px) {
      .charts-grid { grid-template-columns: 1fr 1fr; }
    }
    .chart-panel {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      padding: 16px;
      box-shadow: var(--sw-shadow);
    }
    .chart-panel h4 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sw-text);
      margin-bottom: 12px;
    }
    .chart-wrap { position: relative; width: 100%; }
    .chart-wrap canvas { width: 100% !important; }

    /* Funnel */
    .funnel-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .funnel-label { font-size: 12px; font-weight: 600; width: 70px; text-align: right; color: var(--sw-text); }
    .funnel-track { flex: 1; height: 28px; background: var(--sw-light); border-radius: 6px; position: relative; overflow: hidden; }
    .funnel-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 700; color: #fff; transition: width 0.5s ease; }
    .funnel-drop { font-size: 11px; color: var(--sw-text-sec); width: 50px; text-align: left; }

    /* Top suburbs table */
    .suburbs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .suburbs-table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sw-text-sec);
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 2px solid var(--sw-border);
    }
    .suburbs-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--sw-border);
    }
    .suburbs-table tr:nth-child(even) td { background: var(--sw-light); }

    /* Leaderboard */
    .leaderboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .leader-card {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      padding: 16px;
      box-shadow: var(--sw-shadow);
      text-align: center;
    }
    .leader-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--sw-light);
      margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--sw-mid);
    }
    .leader-name { font-size: 14px; font-weight: 600; }
    .leader-stat { font-size: 12px; color: var(--sw-text-sec); margin-top: 4px; }
    .leader-stat strong { color: var(--sw-text); font-family: var(--sw-font-num); }
    .leader-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--sw-orange);
      margin-bottom: 4px;
    }

    /* ══════════════════════════════════════════════════
       LEADS TAB
       ══════════════════════════════════════════════════ */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
      flex-wrap: wrap;
    }
    @media (max-width: 768px) {
      .filter-bar { flex-wrap: nowrap; }
    }
    .filter-bar input,
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--sw-font);
      background: var(--sw-card);
      color: var(--sw-text);
      min-width: 130px;
    }
    .filter-bar input { min-width: 180px; }

    /* Lead cards (mobile) */
    .lead-cards { display: none; }
    @media (max-width: 768px) {
      .lead-cards { display: block; }
      .lead-table-wrap { display: none; }
    }
    .lead-card {
      background: var(--sw-card);
      border-radius: var(--sw-radius);
      box-shadow: var(--sw-shadow);
      padding: 14px 16px;
      margin-bottom: 10px;
      border-left: 4px solid var(--sw-border);
    }
    .lead-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .lead-card-name { font-size: 15px; font-weight: 600; color: var(--sw-text); }
    .lead-card-suburb { font-size: 12px; color: var(--sw-text-sec); margin-top: 2px; }
    .lead-card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; }
    .lead-card-phone { color: var(--sw-blue); text-decoration: none; font-weight: 600; }

    /* Lead table (desktop) */
    .lead-table-wrap { overflow-x: auto; }
    @media (max-width: 768px) {
      .lead-table-wrap { display: none; }
    }
    .lead-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .lead-table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sw-text-sec);
      font-weight: 600;
      padding: 10px 12px;
      border-bottom: 2px solid var(--sw-border);
      white-space: nowrap;
    }
    .lead-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--sw-border);
      vertical-align: middle;
    }
    .lead-table tr:nth-child(even) td { background: var(--sw-light); }
    .lead-table tr:hover td { background: rgba(241,90,41,0.04); }

    /* Status + source badges */
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 10px;
      display: inline-block;
      white-space: nowrap;
    }
    .status-draft { background: rgba(52,152,219,0.1); color: var(--sw-blue); }
    .status-quoted { background: rgba(241,90,41,0.1); color: var(--sw-orange); }
    .status-accepted { background: rgba(39,174,96,0.1); color: var(--sw-green); }
    .status-cancelled, .status-lost { background: rgba(231,76,60,0.1); color: var(--sw-red); }

    .source-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 8px;
      display: inline-block;
      white-space: nowrap;
    }
    .source-google_ads { background: rgba(52,152,219,0.1); color: var(--sw-blue); }
    .source-organic { background: rgba(39,174,96,0.1); color: var(--sw-green); }
    .source-referral { background: rgba(142,68,173,0.1); color: #8E44AD; }
    .source-direct, .source-unknown { background: var(--sw-light); color: var(--sw-text-sec); }

    .utm-text { font-size: 10px; color: var(--sw-text-sec); margin-top: 1px; }
    .hot-badge {
      display: inline-block;
      font-size: 10px;
      background: rgba(231,76,60,0.1);
      color: var(--sw-red);
      padding: 1px 6px;
      border-radius: 6px;
      font-weight: 600;
      margin-left: 4px;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--sw-text-sec);
    }
    .pagination-btns { display: flex; gap: 6px; }
    .pagination-btns button {
      padding: 6px 14px;
      border: 1px solid var(--sw-border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: var(--sw-card);
      color: var(--sw-text);
      font-family: var(--sw-font);
    }
    .pagination-btns button:disabled { opacity: 0.4; cursor: default; }
    .pagination-btns button:hover:not(:disabled) { background: var(--sw-light); }

    /* ══════════════════════════════════════════════════
       TOAST
       ══════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--sw-dark);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--sw-red); }
    .toast.success { background: var(--sw-green); }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════ -->
<div class="header" id="mainHeader" style="display:none">
  <div class="header-left">
    <div class="header-brand">SecureWorks <span>Sale</span></div>
    <div class="header-nav">
      <button data-view="today" onclick="showView('today')" class="active">Today</button>
      <button data-view="pipeline" onclick="showView('pipeline')">Pipeline</button>
      <button data-view="performance" onclick="showView('performance')">Stats</button>
      <button data-view="leads" onclick="showView('leads')">Leads</button>
    </div>
  </div>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <button class="btn-header" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     BOTTOM NAV (mobile)
     ══════════════════════════════════════════════════ -->
<div class="bottom-nav" id="bottomNav">
  <button data-view="today" onclick="showView('today')" class="active">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg>
    Today
  </button>
  <button data-view="pipeline" onclick="showView('pipeline')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1" fill="currentColor"/><rect x="10" y="8" width="5" height="13" rx="1" fill="currentColor"/><rect x="17" y="5" width="5" height="16" rx="1" fill="currentColor"/></svg>
    Pipeline
  </button>
  <button data-view="performance" onclick="showView('performance')">
    <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Stats
  </button>
  <button data-view="leads" onclick="showView('leads')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M23 21v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    Leads
  </button>
</div>

<!-- ══════════════════════════════════════════════════
     LOGIN VIEW
     ══════════════════════════════════════════════════ -->
<div id="viewLogin" class="view active">
  <div class="login-box">
    <h2>SecureWorks Sale</h2>
    <p>Sales Performance Dashboard</p>
    <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Log In</button>
    <div id="loginError" style="display:none;padding:12px;background:#fdeaea;border-radius:8px;color:var(--sw-red);font-size:14px;font-weight:600;margin-top:12px"></div>

</div>

<!-- ══════════════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════════════ -->
<script>
(function() {

  // ─── Globals ───
  var cloud = null;
  var _user = null;
  var _isAdmin = false;
  var _currentView = 'today';
  var _salespeople = [];
  var _initRetries = 0;
  var _maxRetries = 25;
  var _slideJobId = null;
  var _slideContactId = null;
  var _slideContactData = null; // { client_name, client_phone, client_email, ghl_contact_id, firstName }
  var _slideCallingPhone = null; // set before tel: link, used by visibilitychange
  var _conversationCache = {}; // keyed by ghl_contact_id
  var GHL_PROXY = 'https://kevgrhcjxspbxgovpmfl.supabase.co/functions/v1/ghl-proxy';
  var _leadsPage = 1;
  var _leadsPerPage = 25;
  var _leadsTotal = 0;
  var _searchDebounce = null;
  var _chartWeekly = null;
  var _chartType = null;
  var _pipelineTypeFilter = 'all';
  var _performancePeriod = 'this_month';
  var _customFrom = '';
  var _customTo = '';
  var _lostExpanded = false;

  var REPORT_API = window.SUPABASE_URL + '/functions/v1/reporting-api';
  var OPS_API = window.SUPABASE_URL + '/functions/v1/ops-api';

  // ─── Utility Functions ───
  function fmtCurrency(n) {
    return '$' + (n || 0).toLocaleString('en-AU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function fmtDaysAgo(dateStr) {
    if (!dateStr) return '\u2014';
    var days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return '1 day';
    return days + ' days';
  }

  function daysCount(dateStr) {
    if (!dateStr) return 0;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  }

  function relativeTime(dateStr) {
    if (!dateStr) return '';
    var mins = Math.floor((Date.now() - new Date(dateStr).getTime()) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function daysClass(days) {
    if (days < 7) return 'days-green';
    if (days <= 14) return 'days-amber';
    return 'days-red';
  }

  function ageClass(days) {
    if (days < 7) return 'age-green';
    if (days <= 14) return 'age-amber';
    return 'age-red';
  }

  function statusBadge(status) {
    var s = (status || 'draft').toLowerCase().replace(/\s+/g, '_');
    var labels = { draft: 'New', quoted: 'Quoted', accepted: 'Won', cancelled: 'Lost', lost: 'Lost' };
    return '<span class="status-badge status-' + s + '">' + (labels[s] || s) + '</span>';
  }

  function sourceBadge(source) {
    var s = (source || 'unknown').toLowerCase().replace(/\s+/g, '_');
    var labels = { google_ads: 'Google Ads', organic: 'Organic', referral: 'Referral', direct: 'Direct', unknown: 'Unknown' };
    return '<span class="source-badge source-' + s + '">' + (labels[s] || s) + '</span>';
  }

  function typePill(type) {
    var t = (type || '').toLowerCase();
    if (t.indexOf('fenc') !== -1) return '<span class="type-pill fencing">Fence</span>';
    if (t.indexOf('deck') !== -1) return '<span class="type-pill decking">Deck</span>';
    if (t.indexOf('combo') !== -1) return '<span class="type-pill combo">Combo</span>';
    return '<span class="type-pill patio">Patio</span>';
  }

  function phoneIcon() {
    return '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
  }

  function friendlyError(err) {
    if (!err) return 'Unknown error';
    var msg = err.message || String(err);
    if (msg.indexOf('fetch') !== -1 || msg.indexOf('network') !== -1) return 'Network error — check your connection';
    if (msg.indexOf('401') !== -1 || msg.indexOf('403') !== -1) return 'Session expired — please log in again';
    return msg;
  }

  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (type ? ' ' + type : '');
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  function getSpFilter() {
    var selId = 'spFilter' + _currentView.charAt(0).toUpperCase() + _currentView.slice(1);
    var sel = document.getElementById(selId);
    return (sel && sel.value) ? sel.value : '';
  }

  // ─── API Helper ───
  function saleFetch(action, params) {
    params = params || {};
    var qs = new URLSearchParams({ action: action });
    Object.keys(params).forEach(function(k) {
      if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
        qs.set(k, params[k]);
      }
    });
    if (!_isAdmin && _user) qs.set('salesperson_id', _user.id);
    var sp = getSpFilter();
    if (_isAdmin && sp) qs.set('salesperson_id', sp);
    return fetch(REPORT_API + '?' + qs.toString()).then(function(res) {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    });
  }

  function opsFetch(action, params) {
    params = params || {};
    var qs = new URLSearchParams({ action: action });
    Object.keys(params).forEach(function(k) {
      if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
        qs.set(k, params[k]);
      }
    });
    return fetch(OPS_API + '?' + qs.toString()).then(function(res) {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    });
  }

  // ─── Auth ───
  window.doLogin = function() {
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    if (!email || !password) {
      showLoginError('Please enter your email and password');
      return;
    }
    var btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    hideLoginError();

    cloud.auth.signInWithPassword(email, password).then(function() {
      // onLogin fires via auth:login event
    }).catch(function(err) {
      var msg = (err && err.message) || String(err);
      if (msg.indexOf('Invalid login') !== -1 || msg.indexOf('invalid') !== -1) {
        showLoginError('Wrong email or password \u2014 try again');
      } else {
        showLoginError(friendlyError(err));
      }
      btn.disabled = false;
      btn.textContent = 'Log In';
    });
  };

  function showLoginError(msg) {
    var el = document.getElementById('loginError');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }
  function hideLoginError() {
    var el = document.getElementById('loginError');
    if (el) el.style.display = 'none';
  }

  document.getElementById('loginEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginPassword').focus();
  });
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  window.doLogout = function() {
    if (cloud && cloud.supabase) {
      cloud.supabase.auth.signOut();
    }
  };

  function onLogin(profile) {
    _user = profile;
    if (!_user) { console.error('[sale] onLogin: profile is null!'); return; }
    _isAdmin = (_user.email && _user.email.indexOf('marnin') !== -1) || _user.role === 'admin';

    document.getElementById('headerUser').textContent = _user.name || _user.email;
    document.getElementById('mainHeader').style.display = 'flex';
    document.getElementById('bottomNav').classList.add('show');
    document.getElementById('viewLogin').classList.remove('active');

    if (_isAdmin) {
      loadSalespeople();
      document.querySelectorAll('.admin-filter').forEach(function(el) { el.classList.add('show'); });
    }

    var saved = localStorage.getItem('sw_sale_tab');
    showView(saved || 'today');
  }

  function loadSalespeople() {
    opsFetch('list_users').then(function(data) {
      var users = data.users || data || [];
      _salespeople = users;
      var opts = '<option value="">All Salespeople</option>';
      users.forEach(function(u) {
        opts += '<option value="' + u.id + '">' + (u.name || u.email) + '</option>';
      });
      document.querySelectorAll('.admin-filter select').forEach(function(sel) {
        sel.innerHTML = opts;
      });
    }).catch(function(err) {
      console.error('Failed to load salespeople:', err);
    });
  }

  // ─── View switching ───
  window.showView = function(view) {
    _currentView = view;
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.bottom-nav button, .header-nav button').forEach(function(b) { b.classList.remove('active'); });

    var el = document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1));
    if (el) el.classList.add('active');
    document.querySelectorAll('[data-view="' + view + '"]').forEach(function(b) { b.classList.add('active'); });
    localStorage.setItem('sw_sale_tab', view);

    if (view === 'today') loadToday();
    if (view === 'pipeline') loadPipeline();
    if (view === 'performance') loadPerformance();
    if (view === 'leads') loadLeads();
  };

  // ══════════════════════════════════════════════════
  // TODAY TAB
  // ══════════════════════════════════════════════════
  window.loadToday = function() {
    var container = document.getElementById('todayContent');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading your dashboard...</div>';

    saleFetch('sales_summary').then(function(data) {
      // Map sales_summary response to expected shapes
      var stats = {
        quotes_sent: (data.quotes_this_week || {}).count || 0,
        quotes_value: (data.quotes_this_week || {}).value || 0,
        jobs_booked: (data.booked_this_week || {}).count || 0,
        booked_value: (data.booked_this_week || {}).value || 0,
        my_leads: (data.my_leads || {}).count || 0,
        oldest_lead_date: null, // not returned directly
        close_rate: data.close_rate_month || 0
      };
      var actions = data.actions || {};
      var feed = { events: data.recent_activity || [] };
      renderToday(stats, actions, feed);
    }).catch(function(err) {
      container.innerHTML = '<div class="error-state"><p>Failed to load dashboard</p><p style="font-size:12px;margin-top:4px">' + friendlyError(err) + '</p><button class="btn btn-secondary btn-small" onclick="loadToday()" style="margin-top:12px">Retry</button></div>';
    });
  };

  function renderToday(stats, actions, feed) {
    var container = document.getElementById('todayContent');
    var closeRate = stats.close_rate || 0;
    var closeColor = closeRate >= 40 ? 'green' : 'amber';

    var html = '';

    // Stat cards
    html += '<div class="stat-grid">';
    html += '<div class="stat-card border-orange"><div class="stat-icon orange"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="stat-body"><div class="stat-label">Quotes Sent</div><div class="stat-value">' + (stats.quotes_sent || 0) + '</div><div class="stat-sub">worth ' + fmtCurrency(stats.quotes_value) + '</div></div></div>';
    html += '<div class="stat-card border-green"><div class="stat-icon green"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-body"><div class="stat-label">Jobs Booked</div><div class="stat-value">' + (stats.jobs_booked || 0) + '</div><div class="stat-sub">worth ' + fmtCurrency(stats.booked_value) + '</div></div></div>';
    html += '<div class="stat-card border-blue"><div class="stat-icon blue"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-body"><div class="stat-label">My Leads</div><div class="stat-value">' + (stats.my_leads || 0) + '</div><div class="stat-sub">oldest: ' + fmtDaysAgo(stats.oldest_lead_date) + '</div></div></div>';
    html += '<div class="stat-card border-' + closeColor + '"><div class="stat-icon ' + closeColor + '"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-body"><div class="stat-label">Close Rate</div><div class="stat-value">' + closeRate + '%</div><div class="stat-sub">this month</div></div></div>';
    html += '</div>';

    // Actions
    html += '<div class="section-heading">My Actions Today</div>';

    var needsContact = actions.needs_first_contact || [];
    var followUps = actions.follow_ups_due || [];
    var scopesToday = actions.scope_visits_today || [];
    var quotesExpiring = actions.quotes_expiring || [];

    html += renderActionSection('Needs First Contact', needsContact, 'red');
    html += renderActionSection('Follow-ups Due', followUps, 'amber');
    html += renderActionSection('Scope Visits Today', scopesToday, 'blue');
    html += renderActionSection('Quotes Expiring', quotesExpiring, 'red');

    // Activity feed
    var feedItems = feed.events || feed.items || [];
    if (feedItems.length > 0) {
      html += '<div class="section-heading">Recent Activity</div>';
      html += '<div style="background:var(--sw-card);border-radius:var(--sw-radius);box-shadow:var(--sw-shadow);padding:4px 16px">';
      html += '<ul class="feed-list">';
      feedItems.forEach(function(item) {
        var icon = '\u2022';
        if (item.type === 'quote_sent') icon = '\uD83D\uDCE4';
        else if (item.type === 'job_accepted' || item.type === 'accepted') icon = '\u2705';
        else if (item.type === 'scope_completed') icon = '\uD83D\uDCCD';
        else if (item.type === 'note_added') icon = '\uD83D\uDCDD';
        else if (item.type === 'lead_created') icon = '\u2795';
        html += '<li class="feed-item"><div class="feed-icon">' + icon + '</div><div class="feed-body"><div class="feed-text">' + (item.description || item.text || '\u2014') + '</div><div class="feed-time">' + relativeTime(item.created_at || item.timestamp) + '</div></div></li>';
      });
      html += '</ul></div>';
    }

    if (needsContact.length === 0 && followUps.length === 0 && scopesToday.length === 0 && quotesExpiring.length === 0 && feedItems.length === 0) {
      html += '<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 14s1.5 2 4 2 4-2 4-2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="9" x2="9.01" y2="9" stroke="currentColor" stroke-width="2"/><line x1="15" y1="9" x2="15.01" y2="9" stroke="currentColor" stroke-width="2"/></svg><p>No quotes sent yet \u2014 time to hit the phones!</p></div>';
    }

    container.innerHTML = html;
  }

  function renderActionSection(title, items, color) {
    var count = items.length;
    var open = count > 0 ? ' open' : '';
    var html = '<div class="action-section' + open + '" onclick="this.classList.toggle(\'open\')">';
    html += '<div class="action-header"><span>' + title + '</span><span style="display:flex;align-items:center;gap:8px"><span class="count-badge ' + (count > 0 ? color : 'grey') + '">' + count + '</span><span class="chevron">\u25BC</span></span></div>';
    html += '<div class="action-body" onclick="event.stopPropagation()"><div class="action-body-inner">';

    if (count === 0) {
      html += '<div style="padding:12px 0;color:var(--sw-text-sec);font-size:13px;text-align:center">All clear here</div>';
    } else {
      items.forEach(function(item) {
        var days = daysCount(item.created_at || item.date);
        var dCls = daysClass(days);
        var phone = item.phone || item.client_phone || '';
        html += '<div class="action-item">';
        html += '<div class="action-item-info"><div class="action-item-name">' + (item.client_name || '\u2014') + '</div><div class="action-item-detail">' + (item.suburb || '') + (item.type ? ' \u00B7 ' + item.type : '') + '</div></div>';
        if (item.quote_value || item.value) {
          html += '<div class="action-item-value">' + fmtCurrency(item.quote_value || item.value) + '</div>';
        }
        html += '<span class="action-item-days ' + dCls + '">' + fmtDaysAgo(item.created_at || item.date) + '</span>';
        if (phone) {
          html += '<a class="action-item-phone" href="tel:' + phone.replace(/\s/g, '') + '">' + phoneIcon() + '</a>';
        }
        html += '</div>';
      });
    }

    html += '</div></div></div>';
    return html;
  }

  // ══════════════════════════════════════════════════
  // PIPELINE TAB
  // ══════════════════════════════════════════════════
  window.loadPipeline = function() {
    var container = document.getElementById('pipelineContent');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading pipeline...</div>';

    saleFetch('sales_pipeline').then(function(data) {
      renderPipeline(data);
    }).catch(function(err) {
      container.innerHTML = '<div class="error-state"><p>Failed to load pipeline</p><p style="font-size:12px;margin-top:4px">' + friendlyError(err) + '</p><button class="btn btn-secondary btn-small" onclick="loadPipeline()" style="margin-top:12px">Retry</button></div>';
    });
  };

  function renderPipeline(data) {
    var container = document.getElementById('pipelineContent');
    var jobs = data.jobs || data.leads || data || [];
    if (!Array.isArray(jobs)) jobs = [];

    // Filter by type
    var filtered = _pipelineTypeFilter === 'all' ? jobs : jobs.filter(function(j) {
      var t = (j.type || j.job_type || '').toLowerCase();
      if (_pipelineTypeFilter === 'patio') return t.indexOf('patio') !== -1 || t.indexOf('carport') !== -1;
      if (_pipelineTypeFilter === 'fencing') return t.indexOf('fenc') !== -1;
      if (_pipelineTypeFilter === 'decking') return t.indexOf('deck') !== -1;
      return true;
    });

    var totalValue = 0;
    filtered.forEach(function(j) { totalValue += (j.quote_value || j.value || 0); });

    var cols = {
      draft: [],
      quoted: [],
      accepted: [],
      cancelled: []
    };

    filtered.forEach(function(j) {
      var s = (j.status || 'draft').toLowerCase();
      if (s === 'lost') s = 'cancelled';
      if (cols[s]) cols[s].push(j);
      else cols.draft.push(j);
    });

    var html = '';
    html += '<div class="pipeline-total">Pipeline value: <strong>' + fmtCurrency(totalValue) + '</strong></div>';

    // Filter chips
    html += '<div class="filter-chips">';
    ['all', 'patio', 'fencing', 'decking'].forEach(function(t) {
      var label = t.charAt(0).toUpperCase() + t.slice(1);
      if (t === 'all') label = 'All';
      html += '<button class="filter-chip' + (_pipelineTypeFilter === t ? ' active' : '') + '" onclick="setPipelineFilter(\'' + t + '\')">' + label + '</button>';
    });
    html += '</div>';

    // Kanban
    html += '<div class="kanban">';
    html += renderKanbanCol('New Lead', cols.draft, 'blue');
    html += renderKanbanCol('Quote Sent', cols.quoted, 'orange');
    html += renderKanbanCol('Won', cols.accepted, 'green');
    html += renderKanbanColCollapsible('Lost', cols.cancelled, 'red');
    html += '</div>';

    container.innerHTML = html;
  }

  function renderKanbanCol(title, items, color) {
    var html = '<div class="kanban-col">';
    html += '<div class="kanban-header ' + color + '"><span>' + title + '</span><span class="col-count">' + items.length + '</span></div>';
    html += '<div class="kanban-body">';
    if (items.length === 0) {

  // ── Load conversation from GHL ──
  // TODO: Requires ghl-proxy?action=get_conversation — takes contactId, returns last 30 messages from GHL Conversations API
  //       GET /conversations/search?contactId=XXX then GET /conversations/{id}/messages
  //       Returns: array of { id, type (SMS/EMAIL/CALL), direction (inbound/outbound), body, timestamp, sender_name }
  function loadConversation(contactId, loadMore) {
    if (!contactId) return;

    // Check sessionStorage cache
    var cacheKey = 'sw_conv_' + contactId;
    if (!loadMore && _conversationCache[contactId]) {
      renderConversation(_conversationCache[contactId]);
      return;
    }

    var thread = document.getElementById('chatThread');
    if (thread) thread.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading messages...</div>';

    fetch(GHL_PROXY + '?action=get_conversation&contactId=' + encodeURIComponent(contactId)).then(function(res) {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    }).then(function(data) {
      var messages = data.messages || data || [];
      _conversationCache[contactId] = messages;
      // Cache in sessionStorage
      try { sessionStorage.setItem(cacheKey, JSON.stringify(messages)); } catch(e) {}
      renderConversation(messages);
    }).catch(function(err) {
      // Graceful degradation — edge function not yet built
      var thread = document.getElementById('chatThread');
      if (thread) {
        var ghlUrl = 'https://app.gohighlevel.com/v2/location/' + contactId;
        thread.innerHTML = '<div class="chat-fallback">Client messaging coming soon<br><a href="' + ghlUrl + '" target="_blank">View in GHL</a></div>';
      }
    });

    // Also check for related jobs with same contact
    loadRelatedJobs(contactId);
  }

  function renderConversation(messages) {
    var thread = document.getElementById('chatThread');
    if (!thread) return;

    if (!messages || messages.length === 0) {
      thread.innerHTML = '<div class="chat-fallback">No messages yet \u2014 send the first one!</div>';
      return;
    }

    var html = '';
    // Show load more if we got 30 messages (might be more)
    if (messages.length >= 30) {
      html += '<div class="chat-load-more"><button onclick="loadConversation(\'' + (_slideContactId || '') + '\', true)">Load older messages</button></div>';
    }

    // Messages are newest-first from API, reverse for chronological display
    var sorted = messages.slice().sort(function(a, b) {
      return new Date(a.timestamp || a.dateAdded || a.created_at).getTime() - new Date(b.timestamp || b.dateAdded || b.created_at).getTime();
    });

    sorted.forEach(function(m) {
      var type = (m.type || '').toUpperCase();
      var dir = (m.direction || '').toLowerCase();
      var body = m.body || m.message || '';
      var ts = m.timestamp || m.dateAdded || m.created_at || '';
      var sender = m.sender_name || '';

      if (type === 'CALL' || m.messageType === 'call') {
        // Call log entry
        var duration = m.duration ? (Math.round(m.duration / 60) + ' min') : '';
        html += '<div class="chat-msg call-log">Phone call' + (duration ? ' \u2014 ' + duration : '') + ' \u2014 ' + formatMsgTime(ts) + '</div>';
      } else {
        // SMS or Email
        var cls = dir === 'inbound' ? 'inbound' : 'outbound';
        html += '<div class="chat-msg ' + cls + '">';
        html += '  <div class="msg-body">' + escHtml(body) + '</div>';
        html += '  <div class="msg-meta">';
        if (sender && cls === 'outbound') html += sender + ' \u2022 ';
        html += formatMsgTime(ts);
        if (type === 'EMAIL') html += ' \u2022 Email';
        html += '  </div>';
        html += '</div>';
      }
    });

    thread.innerHTML = html;
    // Scroll to bottom
    thread.scrollTop = thread.scrollHeight;
  }

  function formatMsgTime(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var now = new Date();
    var diffMs = now.getTime() - d.getTime();
    var diffDays = Math.floor(diffMs / 86400000);
    var time = d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
    if (diffDays === 0) return time;
    if (diffDays === 1) return 'Yesterday ' + time;
    if (diffDays < 7) return d.toLocaleDateString('en-AU', { weekday: 'short' }) + ' ' + time;
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) + ' ' + time;
  }

    var input = document.getElementById('chatInput');

    var message = (input ? input.value.trim() : '');
    if (!message || !_slideContactId) return;

    btn.disabled = true;
    btn.textContent = 'Sending...';

    // Optimistic UI — add message immediately
    var thread = document.getElementById('chatThread');
    var fallback = thread ? thread.querySelector('.chat-fallback') : null;
    if (fallback) fallback.remove();
    if (thread) {
      var msgEl = document.createElement('div');
      msgEl.className = 'chat-msg outbound';
      msgEl.innerHTML = '<div class="msg-body">' + escHtml(message) + '</div><div class="msg-meta">Just now</div>';
      thread.appendChild(msgEl);
      thread.scrollTop = thread.scrollHeight;
    }
    input.value = '';
    updateCharCount();
    document.getElementById('chatTemplate').value = '';

    fetch(GHL_PROXY + '?action=send_sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

        contactId: _slideContactId,

        jobId: _slideJobId || undefined,
        userId: _user ? _user.id : undefined

      if (!res.ok) throw new Error('API error: ' + res.status);

      toast('Message sent', 'success');

  // ══════════════════════════════════════════════════
  // PERFORMANCE TAB
  // ══════════════════════════════════════════════════
  window.loadPerformance = function() {
    var container = document.getElementById('performanceContent');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading stats...</div>';

    // Convert period to from/to dates for the API
    var params = {};
    var now = new Date();
    if (_performancePeriod === 'custom' && _customFrom && _customTo) {
      params.from = _customFrom;
      params.to = _customTo;
    } else if (_performancePeriod === 'this_week') {
      var dow = now.getDay() || 7;
      var mon = new Date(now.getTime() - (dow - 1) * 86400000);
      params.from = mon.toISOString().slice(0, 10);
      params.to = now.toISOString().slice(0, 10);
    } else if (_performancePeriod === 'last_month') {
      var lm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      var lmEnd = new Date(now.getFullYear(), now.getMonth(), 0);
      params.from = lm.toISOString().slice(0, 10);
      params.to = lmEnd.toISOString().slice(0, 10);
    } else {
      // this_month (default)
      params.from = now.toISOString().slice(0, 7) + '-01';
      params.to = now.toISOString().slice(0, 10);
    }

    saleFetch('sales_performance', params).then(function(data) {
      // sales_performance returns everything in one response
      var kpisRaw = data.kpis || {};
      var kpis = {
        total_quoted_count: (kpisRaw.total_quoted || {}).count || 0,
        total_quoted_value: (kpisRaw.total_quoted || {}).value || 0,
        total_booked_count: (kpisRaw.total_booked || {}).count || 0,
        total_booked_value: (kpisRaw.total_booked || {}).value || 0,
        close_rate: kpisRaw.close_rate || 0,
        avg_job_value: kpisRaw.avg_job_value || 0,
        avg_lead_to_quote_days: kpisRaw.avg_days_lead_to_quote || 0,
        avg_quote_to_accepted_days: kpisRaw.avg_days_quote_to_accepted || 0,
        revenue: 0
      };
      var weekly = data.weekly_trend || [];
      var byType = data.by_type || {};
      // Convert funnel object { leads, scoped, quoted, accepted } to array format
      var funnelRaw = data.funnel || {};
      var funnel = [
        { label: 'Leads', count: funnelRaw.leads || 0 },
        { label: 'Scoped', count: funnelRaw.scoped || 0 },
        { label: 'Quoted', count: funnelRaw.quoted || 0 },
        { label: 'Accepted', count: funnelRaw.accepted || 0 }
      ];
      var suburbs = data.by_suburb || [];
      var leaderboard = _isAdmin ? (data.leaderboard || []) : null;
      renderPerformance(kpis, weekly, byType, funnel, suburbs, leaderboard);
    }).catch(function(err) {
      container.innerHTML = '<div class="error-state"><p>Failed to load stats</p><p style="font-size:12px;margin-top:4px">' + friendlyError(err) + '</p><button class="btn btn-secondary btn-small" onclick="loadPerformance()" style="margin-top:12px">Retry</button></div>';
    });
  };
