      _performancePeriod = 'custom';
      loadPerformance();
    }
  };

  function renderPerformance(kpis, weekly, byType, funnel, suburbs, leaderboard) {
    var container = document.getElementById('performanceContent');
    var html = '';

    // Period selector
    html += '<div class="period-selector">';
    ['this_week', 'this_month', 'last_month', 'custom'].forEach(function(p) {
      var labels = { this_week: 'This Week', this_month: 'This Month', last_month: 'Last Month', custom: 'Custom' };
      html += '<button class="period-btn' + (_performancePeriod === p ? ' active' : '') + '" onclick="setPeriod(\'' + p + '\')">' + labels[p] + '</button>';
    });
    html += '<div class="custom-dates' + (_performancePeriod === 'custom' ? ' show' : '') + '" id="customDatesWrap"><input type="date" id="perfDateFrom" value="' + _customFrom + '"> <span>to</span> <input type="date" id="perfDateTo" value="' + _customTo + '"> <button class="btn btn-small btn-primary" onclick="applyCustomDates()">Go</button></div>';
    html += '</div>';

    // KPI cards
    html += '<div class="kpi-grid">';
    html += '<div class="kpi-card"><div class="kpi-label">Total Quoted</div><div class="kpi-value">' + (kpis.total_quoted_count || 0) + '</div><div class="kpi-sub">' + fmtCurrency(kpis.total_quoted_value) + '</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Total Booked</div><div class="kpi-value">' + (kpis.total_booked_count || 0) + '</div><div class="kpi-sub">' + fmtCurrency(kpis.total_booked_value) + '</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Close Rate</div><div class="kpi-value">' + (kpis.close_rate || 0) + '%</div><div class="kpi-sub">&nbsp;</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Avg Job Value</div><div class="kpi-value">' + fmtCurrency(kpis.avg_job_value) + '</div><div class="kpi-sub">&nbsp;</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Avg Lead\u2192Quote</div><div class="kpi-value">' + (kpis.avg_lead_to_quote_days || 0) + 'd</div><div class="kpi-sub">&nbsp;</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Avg Quote\u2192Accept</div><div class="kpi-value">' + (kpis.avg_quote_to_accepted_days || 0) + 'd</div><div class="kpi-sub">&nbsp;</div></div>';
    html += '<div class="kpi-card"><div class="kpi-label">Revenue</div><div class="kpi-value">' + fmtCurrency(kpis.revenue) + '</div><div class="kpi-sub">invoiced</div></div>';
    html += '</div>';

    // Charts
    html += '<div class="charts-grid">';

    // Weekly trend chart
    html += '<div class="chart-panel"><h4>Weekly Trend</h4><div class="chart-wrap"><canvas id="chartWeekly" height="220"></canvas></div></div>';

    // By type chart
    html += '<div class="chart-panel"><h4>By Job Type</h4><div class="chart-wrap" style="max-width:280px;margin:0 auto"><canvas id="chartType" height="280"></canvas></div></div>';

    // Funnel
    var funnelData = funnel.stages || funnel || [];
    html += '<div class="chart-panel"><h4>Sales Funnel</h4>';
    if (Array.isArray(funnelData) && funnelData.length > 0) {
      var maxFunnel = funnelData[0].count || 1;
      funnelData.forEach(function(stage, i) {
        var pct = Math.round(((stage.count || 0) / maxFunnel) * 100);
        var colors = ['var(--sw-blue)', 'var(--sw-mid)', 'var(--sw-orange)', 'var(--sw-green)'];
        var drop = i > 0 ? Math.round(((1 - (stage.count || 0) / (funnelData[i - 1].count || 1)) * 100)) + '% drop' : '';
        html += '<div class="funnel-bar"><span class="funnel-label">' + (stage.label || stage.name || '') + '</span><div class="funnel-track"><div class="funnel-fill" style="width:' + Math.max(pct, 5) + '%;background:' + (colors[i] || colors[0]) + '">' + (stage.count || 0) + '</div></div><span class="funnel-drop">' + drop + '</span></div>';
      });
    } else {
      html += '<div style="padding:24px;text-align:center;color:var(--sw-text-sec);font-size:13px">No funnel data available</div>';
    }
    html += '</div>';

    // Top suburbs
    var suburbData = suburbs.suburbs || suburbs || [];
    html += '<div class="chart-panel"><h4>Top Suburbs</h4>';
    if (Array.isArray(suburbData) && suburbData.length > 0) {
      html += '<table class="suburbs-table"><thead><tr><th>Suburb</th><th>Leads</th><th>Conv %</th><th>Avg Value</th></tr></thead><tbody>';
      suburbData.slice(0, 10).forEach(function(s) {
        html += '<tr><td>' + (s.suburb || '\u2014') + '</td><td>' + (s.leads || s.count || 0) + '</td><td>' + (s.conversion_rate || 0) + '%</td><td>' + fmtCurrency(s.avg_value) + '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<div style="padding:24px;text-align:center;color:var(--sw-text-sec);font-size:13px">No suburb data available</div>';
    }
    html += '</div>';

    html += '</div>'; // end charts-grid

    // Leaderboard (admin only)
    if (_isAdmin && leaderboard) {
      var leaders = leaderboard.salespeople || leaderboard || [];
      if (Array.isArray(leaders) && leaders.length > 0) {
        html += '<div class="section-heading" style="margin-top:24px">Leaderboard</div>';
        html += '<div class="leaderboard">';
        leaders.sort(function(a, b) { return (b.booked_value || 0) - (a.booked_value || 0); });
        leaders.forEach(function(sp, i) {
          var initials = (sp.name || sp.email || '?').split(' ').map(function(w) { return w.charAt(0); }).join('').toUpperCase().slice(0, 2);
          html += '<div class="leader-card">';
          html += '<div class="leader-rank">#' + (i + 1) + '</div>';
          html += '<div class="leader-avatar">' + initials + '</div>';
          html += '<div class="leader-name">' + (sp.name || sp.email || '\u2014') + '</div>';
          html += '<div class="leader-stat">Booked: <strong>' + fmtCurrency(sp.booked_value) + '</strong></div>';
          html += '<div class="leader-stat">Close rate: <strong>' + (sp.close_rate || 0) + '%</strong></div>';
          html += '<div class="leader-stat">Avg deal: <strong>' + fmtCurrency(sp.avg_deal_size) + '</strong></div>';
          html += '</div>';
        });
        html += '</div>';
      }
    }

    container.innerHTML = html;

    // Render charts after DOM update
    setTimeout(function() { renderCharts(weekly, byType); }, 50);
  }

  function renderCharts(weekly, byType) {
    // Weekly trend
    var weeklyCanvas = document.getElementById('chartWeekly');
    if (weeklyCanvas) {
      if (_chartWeekly) { _chartWeekly.destroy(); _chartWeekly = null; }
      var weeks = weekly.weeks || weekly || [];
      var labels = [];
      var quotedData = [];
      var bookedData = [];
      if (Array.isArray(weeks)) {
        weeks.slice(-8).forEach(function(w) {
          // Format week label from date string
          var wDate = w.week ? new Date(w.week + 'T00:00:00') : null;
          var wLabel = wDate ? (wDate.getDate() + '/' + (wDate.getMonth() + 1)) : (w.label || w.week || '');
          labels.push(wLabel);
          quotedData.push(Math.round((w.quoted_value || w.quoted || 0) / 1000));
          bookedData.push(Math.round((w.booked_value || w.booked || 0) / 1000));
        });
      }
      _chartWeekly = new Chart(weeklyCanvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Quoted ($K)', data: quotedData, backgroundColor: 'rgba(241,90,41,0.7)', borderRadius: 4 },
            { label: 'Booked ($K)', data: bookedData, backgroundColor: 'rgba(39,174,96,0.7)', borderRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16, font: { size: 12 } } } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
            x: { ticks: { font: { size: 11 } }, grid: { display: false } }
          }
        }
      });
    }

    // By type doughnut
    var typeCanvas = document.getElementById('chartType');
    if (typeCanvas) {
      if (_chartType) { _chartType.destroy(); _chartType = null; }
      // byType may be { patio: 45000, fencing: 12000 } or array — normalise
      var types = byType.types || byType || {};
      var typeLabels = [];
      var typeValues = [];
      var typeColors = [];
      var colorMap = { patio: 'rgba(52,152,219,0.8)', fencing: 'rgba(241,90,41,0.8)', decking: 'rgba(230,126,34,0.8)', combo: 'rgba(142,68,173,0.8)' };
      if (Array.isArray(types)) {
        types.forEach(function(t) {
          var key = (t.type || t.label || 'other').toLowerCase();
          typeLabels.push(t.type || t.label || 'Other');
          typeValues.push(t.count || t.value || 0);
          typeColors.push(colorMap[key] || 'rgba(124,136,152,0.5)');
        });
      } else if (typeof types === 'object') {
        Object.keys(types).forEach(function(key) {
          if (types[key] > 0) {
            typeLabels.push(key.charAt(0).toUpperCase() + key.slice(1));
            typeValues.push(types[key]);
            typeColors.push(colorMap[key.toLowerCase()] || 'rgba(124,136,152,0.5)');
          }
        });
      }
      if (typeLabels.length === 0) {
        typeLabels = ['No data'];
        typeValues = [1];
        typeColors = ['rgba(234,237,240,1)'];
      }
      _chartType = new Chart(typeCanvas, {
        type: 'doughnut',
        data: {
          labels: typeLabels,
          datasets: [{ data: typeValues, backgroundColor: typeColors, borderWidth: 0 }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 12 } } } }
        }
      });
    }
  }

  // ══════════════════════════════════════════════════
  // LEADS TAB
  // ══════════════════════════════════════════════════
  window.loadLeads = function() {
    var container = document.getElementById('leadsContent');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading leads...</div>';

    var params = {
      page: _leadsPage,
      per_page: _leadsPerPage
    };

    // Get filter values if they exist in the DOM
    var searchEl = document.getElementById('leadSearch');
    var statusEl = document.getElementById('leadStatus');
    var sourceEl = document.getElementById('leadSource');
    var sortEl = document.getElementById('leadSort');
    if (searchEl && searchEl.value) params.search = searchEl.value;
    if (statusEl && statusEl.value) params.status_filter = statusEl.value;
    if (sourceEl && sourceEl.value) params.source_filter = sourceEl.value;
    if (sortEl && sortEl.value) params.sort_by = sortEl.value;

    saleFetch('sales_leads', params).then(function(data) {
      renderLeads(data, params);
    }).catch(function(err) {
      container.innerHTML = '<div class="error-state"><p>Failed to load leads</p><p style="font-size:12px;margin-top:4px">' + friendlyError(err) + '</p><button class="btn btn-secondary btn-small" onclick="loadLeads()" style="margin-top:12px">Retry</button></div>';
    });
  };

  function renderLeads(data, params) {
    var container = document.getElementById('leadsContent');
    var leads = data.leads || data.jobs || data || [];
    if (!Array.isArray(leads)) leads = [];
    _leadsTotal = data.total || leads.length;

    var hotSuburbs = data.hot_suburbs || ['Joondalup', 'Wanneroo', 'Baldivis', 'Ellenbrook', 'Byford'];

    var html = '';

    // Filter bar
    html += '<div class="filter-bar">';
    html += '<input type="text" id="leadSearch" placeholder="Search name or suburb..." value="' + (params.search || '') + '" oninput="debounceLeadSearch()">';
    html += '<select id="leadStatus" onchange="resetLeadsPage(); loadLeads()"><option value="">All Status</option><option value="draft"' + (params.status_filter === 'draft' ? ' selected' : '') + '>Draft</option><option value="quoted"' + (params.status_filter === 'quoted' ? ' selected' : '') + '>Quoted</option><option value="accepted"' + (params.status_filter === 'accepted' ? ' selected' : '') + '>Accepted</option><option value="cancelled"' + (params.status_filter === 'cancelled' ? ' selected' : '') + '>Lost</option></select>';
    html += '<select id="leadSource" onchange="resetLeadsPage(); loadLeads()"><option value="">All Sources</option><option value="google_ads"' + (params.source === 'google_ads' ? ' selected' : '') + '>Google Ads</option><option value="organic"' + (params.source === 'organic' ? ' selected' : '') + '>Organic</option><option value="referral"' + (params.source === 'referral' ? ' selected' : '') + '>Referral</option><option value="direct"' + (params.source === 'direct' ? ' selected' : '') + '>Direct</option><option value="unknown"' + (params.source === 'unknown' ? ' selected' : '') + '>Unknown</option></select>';
    html += '<select id="leadSort" onchange="resetLeadsPage(); loadLeads()"><option value="newest"' + (params.sort === 'newest' ? ' selected' : '') + '>Newest</option><option value="oldest"' + (params.sort === 'oldest' ? ' selected' : '') + '>Oldest</option><option value="value_high"' + (params.sort === 'value_high' ? ' selected' : '') + '>Value (high)</option><option value="value_low"' + (params.sort === 'value_low' ? ' selected' : '') + '>Value (low)</option></select>';
    html += '</div>';

    if (leads.length === 0) {
      html += '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><p>No leads matching your filters</p></div>';
      container.innerHTML = html;
      return;
    }

    // Mobile cards
    html += '<div class="lead-cards">';
    leads.forEach(function(l) {
      var days = daysCount(l.created_at);
      var dCls = daysClass(days);
      var isHot = hotSuburbs.indexOf(l.suburb) !== -1;
      var borderColor = (l.status || 'draft') === 'accepted' ? 'var(--sw-green)' : (l.status === 'quoted' ? 'var(--sw-orange)' : (l.status === 'cancelled' ? 'var(--sw-red)' : 'var(--sw-blue)'));
      html += '<div class="lead-card" style="border-left-color:' + borderColor + '" onclick="openSlide(\'' + (l.id || '') + '\')">';
      html += '<div class="lead-card-top"><div><div class="lead-card-name">' + (l.client_name || '\u2014') + (isHot ? ' <span class="hot-badge">HOT</span>' : '') + '</div><div class="lead-card-suburb">' + (l.suburb || '') + '</div></div>' + statusBadge(l.status) + '</div>';
      html += '<div class="lead-card-row"><span>' + sourceBadge(l.source || l.lead_source) + '</span><span class="action-item-days ' + dCls + '">' + fmtDaysAgo(l.created_at) + '</span></div>';
      html += '<div class="lead-card-row">';
      if (l.phone || l.client_phone) html += '<a class="lead-card-phone" href="tel:' + (l.phone || l.client_phone || '').replace(/\s/g, '') + '">' + (l.phone || l.client_phone) + '</a>';
      else html += '<span></span>';
      html += '<span style="font-weight:600;font-family:var(--sw-font-num)">' + fmtCurrency(l.quote_value || l.value) + '</span>';
      html += '</div>';
      if (l.utm_campaign) html += '<div class="utm-text">' + l.utm_campaign + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Desktop table
    html += '<div class="lead-table-wrap"><table class="lead-table"><thead><tr><th>Client</th><th>Phone</th><th>Suburb</th><th>Source</th><th>Date</th><th>Status</th><th>Days</th><th>Value</th></tr></thead><tbody>';
    leads.forEach(function(l) {
      var days = daysCount(l.created_at);
      var dCls = daysClass(days);
      var isHot = hotSuburbs.indexOf(l.suburb) !== -1;
      var phone = l.phone || l.client_phone || '';
      html += '<tr style="cursor:pointer" onclick="openSlide(\'' + (l.id || '') + '\')">';
      html += '<td><strong>' + (l.client_name || '\u2014') + '</strong>' + (isHot ? ' <span class="hot-badge">HOT</span>' : '') + '</td>';
      html += '<td>' + (phone ? '<a href="tel:' + phone.replace(/\s/g, '') + '" style="color:var(--sw-blue);text-decoration:none">' + phone + '</a>' : '\u2014') + '</td>';
      html += '<td>' + (l.suburb || '\u2014') + '</td>';
      html += '<td>' + sourceBadge(l.source || l.lead_source) + (l.utm_campaign ? '<div class="utm-text">' + l.utm_campaign + '</div>' : '') + '</td>';
      html += '<td style="white-space:nowrap">' + (l.created_at ? new Date(l.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) : '\u2014') + '</td>';
      html += '<td>' + statusBadge(l.status) + '</td>';
      html += '<td><span class="action-item-days ' + dCls + '">' + fmtDaysAgo(l.created_at) + '</span></td>';
      html += '<td style="font-weight:600;font-family:var(--sw-font-num);white-space:nowrap">' + fmtCurrency(l.quote_value || l.value) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    // Pagination
    var start = ((_leadsPage - 1) * _leadsPerPage) + 1;
    var end = Math.min(_leadsPage * _leadsPerPage, _leadsTotal);
    html += '<div class="pagination">';
    html += '<span>Showing ' + start + '\u2013' + end + ' of ' + _leadsTotal + '</span>';
    html += '<div class="pagination-btns">';
    html += '<button onclick="prevLeadsPage()"' + (_leadsPage <= 1 ? ' disabled' : '') + '>Prev</button>';
    html += '<button onclick="nextLeadsPage()"' + (end >= _leadsTotal ? ' disabled' : '') + '>Next</button>';
    html += '</div></div>';

    container.innerHTML = html;
  }

  window.debounceLeadSearch = function() {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(function() {
      _leadsPage = 1;
      loadLeads();
    }, 400);
  };

  window.resetLeadsPage = function() {
    _leadsPage = 1;
  };

  window.prevLeadsPage = function() {
    if (_leadsPage > 1) {
      _leadsPage--;
      loadLeads();
    }
  };

  window.nextLeadsPage = function() {
    var maxPage = Math.ceil(_leadsTotal / _leadsPerPage);
    if (_leadsPage < maxPage) {
      _leadsPage++;
      loadLeads();
    }
  };

  // ══════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════
  function initApp() {
    cloud = window.SECUREWORKS_CLOUD;
    if (!cloud) {
      _initRetries++;
      if (_initRetries >= _maxRetries) {
        var loginSub = document.querySelector('.login-box p');
        if (loginSub) loginSub.textContent = 'Failed to load \u2014 please refresh the page';
        return;
      }
      setTimeout(initApp, 200);
      return;
    }

    cloud.on('auth:login', function(profile) {
      onLogin(profile);
    });

    cloud.on('auth:logout', function() {
      _user = null;
      _isAdmin = false;
      document.getElementById('mainHeader').style.display = 'none';
      document.getElementById('bottomNav').classList.remove('show');
      document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
      document.getElementById('viewLogin').classList.add('active');
      document.querySelectorAll('.admin-filter').forEach(function(el) { el.classList.remove('show'); });
    });

    if (cloud.auth.isLoggedIn() && cloud.auth.getUser()) {
      onLogin(cloud.auth.getUser());
    }
  }

  setTimeout(initApp, 100);

})();
</script>
</body>
</html>
